services:
  postgres:
    image: postgres:16-alpine
    profiles: ["mvp2"]
    environment:
      POSTGRES_DB: marketing_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    profiles: ["mvp2"]
    ports:
      - "6379:6379"

volumes:
  postgres_data:
